<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b82ff"/>
      <stop offset="100%" stop-color="#9b59f6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Hexagon outline -->
  <polygon
    points="256,82 408,168 408,344 256,430 104,344 104,168"
    fill="none"
    stroke="white"
    stroke-width="26"
    stroke-linejoin="round"
  />

  <!-- Chevron Λ -->
  <polyline
    points="168,340 256,188 344,340"
    fill="none"
    stroke="white"
    stroke-width="30"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dash below chevron -->
  <line
    x1="216" y1="358" x2="296" y2="358"
    stroke="white"
    stroke-width="26"
    stroke-linecap="round"
  />
</svg>
